[mod-name]
better-alert-icons=Better Alert Icons

[mod-description]
better-alert-icons=Change alert icon size and move them where you want them!

[mod-setting-name]
bai-alert-icon-scale=Alert Icon Scale
bai-alert-icon-padding=Alert Icon Padding
bai-alert-icon-horizontal-position=Alert Icon Horizontal Position
bai-alert-icon-vertical-position=Alert Icon Vertical Position

[mod-setting-description]
bai-alert-icon-scale=Scale used for the alert icon. Must be between 0.0 and 1.0.
bai-alert-icon-padding=Padding around alert icon in percentage of building size. Must be between 0.0 and 1.0.

[string-mod-setting]
bai-alert-icon-horizontal-position-center=Center
bai-alert-icon-horizontal-position-left=Left
bai-alert-icon-horizontal-position-right=Right
bai-alert-icon-vertical-position-center=Center
bai-alert-icon-vertical-position-top=Top
bai-alert-icon-vertical-position-bottom=Bottom 
