name: Release Better Alert Icons

on:
  push:
    tags:
      - "v*"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Zip files
        run: git archive --format=zip HEAD > better-alert-icons_${{ github.ref_name }}.zip

      - name: Release files
        run: gh release create ${{ github.ref_name }} better-alert-icons_${{ github.ref_name }}.zip --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
